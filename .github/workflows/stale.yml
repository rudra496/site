name: Stale Issues & PRs
on:
  schedule:
    - cron: "0 0 * * *"
jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 7 days unless updated."
          stale-pr-message: "This PR has been inactive for 60 days. It will be closed in 7 days unless updated."
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: "pinned,security,enhancement"
          exempt-pr-labels: "pinned"
